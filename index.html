<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nest — Save tabs as reusable context.</title>
    <script>
      (function() {
        // Define global if missing
        if (typeof global === 'undefined') {
          window.global = window;
        }

        try {
          // Some environments define fetch as a getter on the Window prototype or window object.
          // This causes errors when libraries try to assign to window.fetch or global.fetch.
          // We redefine it as a data property to allow assignments and prevent the getter-only error.
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                             Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch') ||
                             Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          
          if (descriptor && descriptor.get && !descriptor.set) {
            const originalFetch = window.fetch.bind(window);
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Ignore errors
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
